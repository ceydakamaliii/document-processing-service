spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/documents_db
    username: documents_user
    password: documents_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    
dms:
  base-url: ${DMS_BASE_URL:https://dms.example.com/api/v1}
  api-key: ${DMS_API_KEY:simulated-api-key-for-dev}
  connect-timeout-ms: 5000
  read-timeout-ms: 30000

management:
  endpoints:
    web:
      exposure:
        include: health